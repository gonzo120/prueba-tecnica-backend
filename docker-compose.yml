version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: payment-db
    environment:
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_password
      POSTGRES_DB: payment_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - payment-network
    restart: unless-stopped

  payment-service:
    build: 
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    environment:
      DATABASE_URL: postgresql://payment_user:payment_password@postgres:5432/payment_db?schema=public
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - payment-network
    restart: unless-stopped
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && node dist/main.js"

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    environment:
      GATEWAY_PORT: 3000
      PAYMENT_SERVICE_URL: http://payment-service:3001
      JWT_SECRET: PRUEBA_TECNICA_SECRET_KEY
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - payment-service
    networks:
      - payment-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  payment-network:
    driver: bridge